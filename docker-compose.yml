services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seozaidly}
      POSTGRES_USER: ${POSTGRES_USER:-seozaidly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seozaidly}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seozaidly}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${POSTGRES_USER:-seozaidly}:${POSTGRES_PASSWORD:-seozaidly}@db:5432/${POSTGRES_DB:-seozaidly}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: "True"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MAYAR_WEBHOOK_SECRET: ${MAYAR_WEBHOOK_SECRET:-}
      MAYAR_PRO_PAYMENT_URL: ${MAYAR_PRO_PAYMENT_URL:-}
      BILLING_FREE_ARTICLE_LIMIT: ${BILLING_FREE_ARTICLE_LIMIT:-10}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
